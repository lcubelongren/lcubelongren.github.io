<script>
function homeAnimation() {
    function createBox() {
        let box = document.createElement('div');
        box.classList.add('home-animation-box');
        box.id = 0;
        document.body.append(box);
    }
    createBox();
	setInterval(frame, 5);
	function frame() {
        for (box of document.getElementsByClassName('home-animation-box')) {
            let i = box.id;
	        let rot = -i;
            let slide = 0 + (i / 35);
		    box.style.transform = `rotate(${rot}deg)`;
            box.style.right = `${slide}vw`;
            box.id = parseInt(box.id) + 1;
            if (slide == 25) {
                createBox();
            }
            if (slide >= 100) {
                box.remove();
            }
		}
	}
}
homeAnimation();
</script>
